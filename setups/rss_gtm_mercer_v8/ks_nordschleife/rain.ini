; RAIN setup for the 3-LAP DUSK STORM duel — Mercedes-AMG GT3 (rss_gtm_mercer_v8).
; Based on nordschleife_1v1_sprint.ini with wet-weather adjustments:
;   - [TYRES] VALUE=1 (next compound past the dry slick at 0; verify in CM if AC loads
;     slicks despite this — see note at bottom).
;   - More wing for downforce in spray.
;   - Softer ARBs + slightly softer rebound damping for mechanical grip on a wet road.
;   - Lower cold tire pressures (~21 psi) — wets build pressure faster than slicks.
;   - Less front camber (wets prefer flatter contact patch on cold rubber).
;   - Brake bias 1% forward (rear lockup is the silent killer in the wet).
;   - TC raised to 5, ABS raised to 7 for wet driveability.
;   - More fuel (22 L) — 3 wet laps + buffer for any spin recovery.

