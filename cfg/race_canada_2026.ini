; Canadian GP 2026 simulation — Circuit Gilles Villeneuve, Montreal F1 2025 layout
; CAR: rss_formula_hybrid_2025_alpine (Alpine 2025 mod — verified-rendering on
; this system. X 2026 car renders white universally and needs separate debugging.)
;
; Player = Max Verstappen #1 on pole.
; (AC requires player at CAR_0 — non-pole start needs a qualifying session.)
;
; AI strength reflects REAL 2026 form as of after Round 4 (Miami GP).
;   AI rank score = (championship position + Miami finishing position) / 2
;   DNF in Miami counted as P20.
;   Linear map score 1..19.5 -> AI 99..84.
;
; ROSTER = real 2026 driver-team pairings (Tsunoda dropped — not in 2026 F1;
; Hadjar moved to Red Bull Racing; Sauber rebranded as Audi).
;
; LIVERY CAVEATS (only 2025-spec AC mods exist for this car):
;   - Hadjar's car wears the 2025 Racing Bulls livery (no 2026 RB Hadjar skin).
;   - Audi entries wear 2025 Stake/Sauber livery (no 2026 Audi rebrand skin).
;
; MISSING from real 2026 grid (no AC skins for this car):
;   - Arvid Lindblad (Racing Bulls, replaced Hadjar)
;   - Sergio Perez (Cadillac, new team for 2026)
;   - Valtteri Bottas (Cadillac, new team for 2026)
;
; Built 2026-05-06 for SimRacingPitStop project (T-16 to real race weekend 22-24 May 2026).

