; CSP graphics overrides — high quality on 4K + RTX hardware
; (merges over /extension/config/graphics_adjustments.ini defaults)

[LODS]
COCKPIT_LR_FIX=0          ; full-quality cockpits in 1st-person, no LOD swaps
DRIVER_LR_FIX=0           ; full-quality drivers in nearby cars
CARS_DISTANCE_MULT=1.5    ; cars hold detailed LODs 50% further
TRACK_DISTANCE_MULT=1.5   ; track LODs 50% further
TREES_DISTANCE_MULT=1.5   ; trees stay sharp further
HIDE_DISTANT_DRIVERS=0    ; show driver helmets in cars at distance
