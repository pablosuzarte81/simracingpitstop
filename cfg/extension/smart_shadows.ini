; CSP shadow overrides — long-distance + filtered shadows for 4K + RTX hardware

[BASIC]
ANISOTROPY=1                       ; filtered shadow texturing — softer edges
AUTOMATIC_SPLITS_DISTANCE=350      ; was 200; pushes shadow render to 350 m
AUTOMATIC_SPLITS_LAMBDA=0.92       ; slightly more nearby detail

[CUSTOM_SHADOW_MATRICES]
ENABLED=1
FOURTH_CASCADE=1                   ; far-distance shadows (Adenau panorama)
FOURTH_CASCADE_DISTANCE=2000       ; max 2000 m — long Nordschleife sightlines
SHADOWED_INTERIOR_MAIN=1
SHADOWED_INTERIOR_MIRROR=1
