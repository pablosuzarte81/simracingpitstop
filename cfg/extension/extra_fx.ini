; CSP extra-FX overrides — enables the off-by-default visual upgrades.
; All of these are GPU-cost. Disable any block if framerate drops below 119.

[HBAO]
ENABLED=1                ; Horizon-Based Ambient Occlusion — modern AO,
                         ; deep contact-shadows under cars, behind kerbs,
                         ; in cockpits. Single biggest visual win.

[SSGI]
ENABLED2=1               ; Screen-Space Global Illumination — light
                         ; bouncing off the track tints the underside of cars

[SSLR]
STEPS_HIZ=150            ; Hi-Z reflection ray-march steps (was 80) —
                         ; sharper edges on car-body / window reflections

[VOLUMETRIC_LIGHTS]
SCALE=0.5                ; volumetric god-rays at 50% res (was 20%) —
                         ; cleaner shafts through trees on Hatzenbach
INTENSITY_MULT=1.7
