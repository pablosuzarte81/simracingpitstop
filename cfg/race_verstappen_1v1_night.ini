; Same scenario as race_verstappen_1v1.ini, but under the Eifel at night: deep dusk, cooler track,
; headlights on. Built on top of CSP base controller (SUN_ANGLE > 80 requires CSP).
; Track: Nordschleife endurance_cup. 1 lap, AI 100 / aggression 85, no track limits.

