; Super GT Fuji Chase 2026 — replicate the Verstappen / Miyake test
; Format mirrors what Content Manager writes for Hotlap mode (TYPE=4, SPAWN_SET=HOTLAP_START).
; Built 2026-05-07 for SimRacingPitStop project.
;
; Real-world reference (March 2026 Red Bull promo test, Fuji Speedway):
;   Atsushi Miyake (Kondo Racing) benchmark : 1:44.075
;   Max Verstappen best (lap 2)             : 1:42.290
; Both pre-loaded into the Verstappen Delta HUD via combo_targets.json.
;
; TRACK and MODEL are placeholders until the mods are installed and the
; verify_install_supergt.cmd script writes in the actual folder names.

[HEADER]
VERSION=2
__CM_FEATURE_SET=2

[RACE]
TRACK=rt_fuji_speedway
CONFIG_TRACK=layout_gp
MODEL=urd_jt5_shiro_2022
MODEL_CONFIG=
CARS=1
AI_LEVEL=100
FIXED_SETUP=0
PENALTIES=0
SKIN=M17_Verstappen_RedBull_Test
DRIFT_MODE=0
RACE_LAPS=10
JUMP_START_PENALTY=0
AI_AGGRESSION=0
RACE_GAS_PENALTY_DISABLED=0
OPPONENTS_VARIETY=0
__CM_WEATHER_TYPE=19
__CM_WEATHER_CONTROLLER=pureCtrl
__TRACK_GEOTAG_LAT=35.3717
__TRACK_GEOTAG_LONG=138.9265
__TRACK_TIMEZONE_BASE_OFFSET=32400
__TRACK_TIMEZONE_OFFSET=32400
__TRACK_TIMEZONE_DTS=0

[OPTIONS]
USE_MPH=0

[LAP_INVALIDATOR]
ALLOWED_TYRES_OUT=-1

[TEMPERATURE]
AMBIENT=14
ROAD=16

[WEATHER]
NAME=sol_36_heavy_rain

[LIGHTING]
SUN_ANGLE=-8.00
TIME_MULT=1.0
CLOUD_SPEED=0.200

[GROOVE]
VIRTUAL_LAPS=10
MAX_LAPS=1
STARTING_LAPS=1

[DYNAMIC_TRACK]
SESSION_START=100
SESSION_TRANSFER=100
RANDOMNESS=0
LAP_GAIN=1

[WIND]
SPEED_KMH_MIN=8
SPEED_KMH_MAX=18
DIRECTION_DEG=270

[REMOTE]
