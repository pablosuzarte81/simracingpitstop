; Dave Cam tribute — Audi 90 Quattro IMSA GTO at the Nordschleife
; Recreate Dave Cam's iRacing combo: 710hp Group B Audi, 2 laps,
; six-car GTO grid. Car names mirror Dave's iRacing rivals from the video
; (https://www.youtube.com/watch?v=DIl_vf5tdgE).
; Layout: nordschleife (standalone ~20.8 km — matches iRacing's layout, Dave's 6:43 reference).
; AI files verified (fast_lane.ai + pit_lane.ai present).
; Built 2026-05-13.
; AC requires player at CAR_0 — non-pole start would need a qualifying session.

